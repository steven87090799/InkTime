{% extends "base.html" %}{% block title %}系統維護｜InkTime{% endblock %}{% block content %}<div class="page-head"><div><p class="eyebrow">背景維護</p><h1>照片掃描與維護</h1><p>掃描會建立可追蹤的背景工作；HTTP Request 不會直接讀取整個照片庫。</p></div></div><section class="panel narrow"><h2>掃描照片資料夾</h2><form id="scan-form" class="form-stack"><label>照片庫名稱<input name="library_name" value="主要照片庫"></label><label>主機或容器內路徑<input name="root_path" placeholder="/photos" required></label><label><input type="checkbox" name="build_thumbnails" checked> 同時建立 512px 本地縮圖</label><button class="primary">建立掃描工作</button></form></section><section class="panel"><h2>其他維護</h2><p><a href="/backups">立即備份與下載</a> · <a href="/photos">清理縮圖快取</a> · <a href="/diagnostics">資料庫完整性與系統狀態</a></p></section>{% endblock %}{% block scripts %}<script>document.getElementById('scan-form').onsubmit=async e=>{e.preventDefault();const f=new FormData(e.target);const body={library_name:f.get('library_name'),root_path:f.get('root_path'),build_thumbnails:f.has('build_thumbnails')};const r=await window.inktimeFetch('/api/v1/maintenance/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await r.json();if(r.ok)location.href=d.detail_url;else alert(d.message||'建立失敗');};</script>{% endblock %}
