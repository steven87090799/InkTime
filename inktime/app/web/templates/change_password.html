{% extends "base.html" %}
{% block title %}變更密碼｜InkTime{% endblock %}
{% block content %}
<section class="panel narrow"><p class="eyebrow">帳號安全</p><h1>變更密碼</h1>
  <form method="post" class="form-stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>目前密碼<input type="password" name="current_password" required autocomplete="current-password"></label>
    <label>新密碼<input type="password" name="new_password" required autocomplete="new-password"></label>
    <label>再次輸入新密碼<input type="password" name="confirmation" required autocomplete="new-password"></label>
    <button class="primary">更新密碼</button>
  </form>
</section>
{% endblock %}
